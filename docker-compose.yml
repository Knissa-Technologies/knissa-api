services:
  postgres:
    image: postgres:17
    container_name: knissa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: knissa
      POSTGRES_USER: knissa
      POSTGRES_PASSWORD: knissa_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    container_name: knissa-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: